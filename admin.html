<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KINORA Admin — Поръчки</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<link rel="icon" href="/favicon.ico" sizes="any"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<meta name="theme-color" content="#4a0c1a"/>
<link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--B:#4a0c1a;--B2:#5c1222;--B4:#3a0814;--OL:#2e3018;--OL3:#7c8240;--BG:#e4d8c0;--BG2:#f0e8d4;--NV:#0c0608;--NV2:#180c10;--GD:#c4a464;--line:rgba(228,216,192,.08)}
body{font-family:'Golos Text',sans-serif;background:var(--NV);color:var(--BG);min-height:100vh}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--NV)}
.login-box{background:var(--NV2);border:1px solid var(--line);padding:3rem;width:100%;max-width:380px}
.login-logo{font-family:'Tenor Sans',sans-serif;font-size:28px;letter-spacing:.3em;color:var(--BG);margin-bottom:.3rem}
.login-sub{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(228,216,192,.3);margin-bottom:2.5rem}
.form-group{margin-bottom:1.2rem}
.form-group label{font-size:8.5px;letter-spacing:.35em;text-transform:uppercase;color:rgba(228,216,192,.35);display:block;margin-bottom:.5rem}
.form-group input{width:100%;background:rgba(228,216,192,.04);border:1px solid rgba(228,216,192,.12);color:var(--BG);padding:12px 14px;font-family:inherit;font-size:13px;outline:none;transition:border .2s}
.form-group input:focus{border-color:rgba(228,216,192,.35)}
.login-btn{width:100%;background:var(--BG);color:var(--B);border:none;padding:14px;font-family:inherit;font-size:10px;letter-spacing:.28em;text-transform:uppercase;cursor:pointer;font-weight:500;transition:all .25s;margin-top:.5rem}
.login-btn:hover{background:var(--GD);color:var(--NV)}
.login-err{font-size:11px;color:#e07070;margin-top:.8rem;text-align:center;min-height:18px}
/* ADMIN */
.admin-wrap{display:none;flex-direction:column;min-height:100vh}
.admin-nav{height:60px;background:var(--NV2);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:sticky;top:0;z-index:10}
.admin-logo{font-family:'Tenor Sans',sans-serif;font-size:18px;letter-spacing:.28em;color:var(--BG)}
.admin-logo span{font-size:10px;letter-spacing:.3em;color:var(--OL3);margin-left:1rem;font-family:'Golos Text',sans-serif;font-weight:400}
.logout-btn{background:none;border:1px solid rgba(228,216,192,.15);color:rgba(228,216,192,.4);padding:7px 16px;font-family:inherit;font-size:9px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:rgba(228,216,192,.35);color:var(--BG)}
.admin-body{padding:2.5rem 2rem;flex:1}
/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2.5rem}
.stat-card{background:var(--NV2);border:1px solid var(--line);padding:1.4rem;transition:border .2s}
.stat-card:hover{border-color:rgba(228,216,192,.18)}
.stat-label{font-size:8px;letter-spacing:.38em;text-transform:uppercase;color:rgba(228,216,192,.3);margin-bottom:.6rem}
.stat-val{font-family:'Tenor Sans',sans-serif;font-size:36px;letter-spacing:.06em;color:var(--BG);line-height:1}
.stat-sub{font-size:10px;color:rgba(228,216,192,.25);margin-top:.3rem;letter-spacing:.04em}
/* FILTERS */
.filters{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.filter-btn{background:none;border:1px solid rgba(228,216,192,.1);padding:7px 18px;font-family:inherit;font-size:9px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;color:rgba(228,216,192,.35);transition:all .2s}
.filter-btn.on,.filter-btn:hover{background:var(--OL);color:var(--BG);border-color:var(--OL)}
.search-input{background:rgba(228,216,192,.04);border:1px solid rgba(228,216,192,.1);color:var(--BG);padding:7px 14px;font-family:inherit;font-size:12px;outline:none;margin-left:auto;width:220px;transition:border .2s}
.search-input:focus{border-color:rgba(228,216,192,.3)}
.search-input::placeholder{color:rgba(228,216,192,.2)}
/* TABLE */
.orders-table{width:100%;border-collapse:collapse}
.orders-table th{font-size:8px;letter-spacing:.35em;text-transform:uppercase;color:rgba(228,216,192,.28);padding:.8rem 1rem;text-align:left;border-bottom:1px solid var(--line)}
.orders-table td{padding:1rem;border-bottom:1px solid rgba(228,216,192,.04);font-size:13px;vertical-align:middle}
.orders-table tr{transition:background .2s;cursor:pointer}
.orders-table tr:hover td{background:rgba(228,216,192,.03)}
.order-id{font-family:'Tenor Sans',sans-serif;font-size:14px;letter-spacing:.08em;color:var(--GD)}
.status-badge{font-size:8px;letter-spacing:.25em;text-transform:uppercase;padding:4px 10px;border:1px solid}
.s-pending{color:#c4a464;border-color:rgba(196,164,100,.3);background:rgba(196,164,100,.08)}
.s-paid{color:#7c8240;border-color:rgba(124,130,64,.3);background:rgba(124,130,64,.08)}
.s-shipped{color:#4a8c9a;border-color:rgba(74,140,154,.3);background:rgba(74,140,154,.08)}
.s-completed{color:rgba(228,216,192,.5);border-color:rgba(228,216,192,.15);background:rgba(228,216,192,.04)}
.s-awaiting_payment{color:#d4906a;border-color:rgba(212,144,106,.3);background:rgba(212,144,106,.08)}
.s-active{color:#7c8240;border-color:rgba(124,130,64,.3);background:rgba(124,130,64,.08)}
.s-depleted{color:rgba(228,216,192,.45);border-color:rgba(228,216,192,.14);background:rgba(228,216,192,.04)}
.s-void{color:#e07070;border-color:rgba(224,112,112,.3);background:rgba(224,112,112,.08)}
.s-invalid{color:#e07070;border-color:rgba(224,112,112,.3);background:rgba(224,112,112,.08)}
/* TABS */
.tabs{display:flex;gap:.4rem;margin-bottom:2rem;border-bottom:1px solid var(--line)}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:10px 20px 14px;font-family:'Tenor Sans',sans-serif;font-size:13px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;color:rgba(228,216,192,.35);transition:all .2s;margin-bottom:-1px}
.tab-btn.on{color:var(--BG);border-bottom-color:var(--GD)}
.tab-btn:hover{color:var(--BG)}
.voucher-code{font-family:'Tenor Sans',sans-serif;font-size:14px;letter-spacing:.1em;color:var(--GD)}
/* ORDER DRAWER */
.order-drawer{position:fixed;top:0;right:0;bottom:0;width:480px;background:var(--NV2);border-left:1px solid var(--line);z-index:50;transform:translateX(100%);transition:transform .38s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.order-drawer.on{transform:translateX(0)}
.od-header{padding:1.8rem 2rem;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--NV2);z-index:1}
.od-header h3{font-family:'Tenor Sans',sans-serif;font-size:18px;letter-spacing:.15em;color:var(--BG)}
.od-close{background:none;border:1px solid rgba(228,216,192,.15);width:34px;height:34px;color:var(--BG);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.od-body{padding:2rem}
.od-section{margin-bottom:2rem}
.od-section-title{font-size:8.5px;letter-spacing:.38em;text-transform:uppercase;color:var(--OL3);margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid rgba(228,216,192,.06)}
.od-field{display:flex;justify-content:space-between;padding:.55rem 0;font-size:13px;border-bottom:1px solid rgba(228,216,192,.04)}
.od-field-label{color:rgba(228,216,192,.32)}
.od-field-val{color:var(--BG);font-weight:400;text-align:right;max-width:60%}
.od-items{}
.od-item{display:flex;justify-content:space-between;align-items:center;padding:.7rem 0;border-bottom:1px solid rgba(228,216,192,.04);font-size:13px}
.od-item-name{color:var(--BG)}
.od-item-meta{font-size:10px;color:rgba(228,216,192,.3);margin-top:2px}
.od-item-price{color:var(--GD)}
.status-select{background:rgba(228,216,192,.04);border:1px solid rgba(228,216,192,.15);color:var(--BG);padding:8px 12px;font-family:inherit;font-size:12px;cursor:pointer;width:100%;margin-top:.5rem;outline:none}
.status-select option{background:var(--NV2)}
.save-status-btn{width:100%;background:var(--OL);color:var(--BG);border:none;padding:12px;font-family:inherit;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;margin-top:.5rem;transition:background .2s}
.save-status-btn:hover{background:var(--OL2)}
.empty-state{text-align:center;padding:5rem 2rem;color:rgba(228,216,192,.2)}
.empty-state h3{font-family:'Tenor Sans',sans-serif;font-size:32px;letter-spacing:.1em;margin-bottom:.5rem}
.loading{text-align:center;padding:4rem;color:rgba(228,216,192,.25);font-size:13px;letter-spacing:.1em}
/* PRODUCT FORM */
.pf-group{margin-bottom:1.2rem}
.pf-group label{font-size:8.5px;letter-spacing:.32em;text-transform:uppercase;color:rgba(228,216,192,.4);display:block;margin-bottom:.45rem}
.pf-group input,.pf-group select,.pf-group textarea{width:100%;background:rgba(228,216,192,.04);border:1px solid rgba(228,216,192,.14);color:var(--BG);padding:10px 12px;font-family:inherit;font-size:13px;outline:none;transition:border .2s}
.pf-group input:focus,.pf-group select:focus,.pf-group textarea:focus{border-color:var(--GD)}
.pf-group select option{background:var(--NV2)}
.pf-group textarea{resize:vertical;min-height:70px;line-height:1.5}
.pf-row{display:flex;gap:.8rem}.pf-row>*{flex:1}
.pf-colors{display:flex;gap:.6rem}
.pf-colors input[type=color],.pf-color{width:100%;height:38px;padding:2px;cursor:pointer;background:rgba(228,216,192,.04);border:1px solid rgba(228,216,192,.14)}
.pf-thumb{width:90px;height:120px;object-fit:cover;border:1px solid var(--line);background:var(--NV);display:block;margin-bottom:.6rem}
.pf-save{width:100%;background:var(--BG);color:var(--B);border:none;padding:13px;font-family:inherit;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;font-weight:500;margin-top:.6rem;transition:all .2s}
.pf-save:hover{background:var(--GD)}
.pf-del{width:100%;background:none;color:#e07070;border:1px solid rgba(224,112,112,.3);padding:11px;font-family:inherit;font-size:9px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;margin-top:.6rem;transition:all .2s}
.pf-del:hover{background:rgba(224,112,112,.1)}
.pf-toggle{display:flex;align-items:center;gap:.6rem;font-size:12px;color:var(--BG)}
.p-thumb-sm{width:34px;height:46px;object-fit:cover;border:1px solid var(--line);background:var(--NV)}
.b-sold-sm{font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;padding:3px 7px;border:1px solid rgba(228,216,192,.3);color:var(--BG);margin-left:6px}
@media(max-width:800px){.stats-row{grid-template-columns:repeat(2,1fr)}.order-drawer{width:100%}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-logo">KINORA</div>
    <div class="login-sub">Административен панел</div>
    <div class="form-group">
      <label>Имейл</label>
      <input type="email" id="email-input" placeholder="admin@kinorabg.com" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="form-group">
      <label>Парола</label>
      <input type="password" id="pwd-input" placeholder="Въведи паролата" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="login-btn" onclick="doLogin()">ВЛЕЗ</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-wrap" id="admin-wrap">
  <div class="admin-nav">
    <div>
      <span class="admin-logo">KINORA</span>
      <span class="admin-logo" style="font-size:12px;letter-spacing:.15em;opacity:.4">ADMIN</span>
    </div>
    <div style="display:flex;align-items:center;gap:1rem">
      <span style="font-size:10px;letter-spacing:.15em;color:rgba(228,216,192,.25)" id="last-refresh"></span>
      <button class="logout-btn" onclick="refreshActive()">↻ Опресни</button>
      <button class="logout-btn" onclick="doLogout()">Излез</button>
    </div>
  </div>
  <div class="admin-body">
    <!-- TAB SWITCHER -->
    <div class="tabs">
      <button class="tab-btn on" id="tab-orders" onclick="switchTab('orders')">Поръчки</button>
      <button class="tab-btn" id="tab-vouchers" onclick="switchTab('vouchers')">Ваучери</button>
      <button class="tab-btn" id="tab-products" onclick="switchTab('products')">Продукти</button>
    </div>

    <!-- ===== ORDERS VIEW ===== -->
    <div id="view-orders">
      <!-- STATS -->
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Общо поръчки</div><div class="stat-val" id="st-total">—</div></div>
        <div class="stat-card"><div class="stat-label">Нови (pending)</div><div class="stat-val" id="st-pending">—</div></div>
        <div class="stat-card"><div class="stat-label">Оборот (€)</div><div class="stat-val" id="st-revenue">—</div></div>
        <div class="stat-card"><div class="stat-label">Изпратени</div><div class="stat-val" id="st-shipped">—</div></div>
      </div>
      <!-- FILTERS -->
      <div class="filters">
        <button class="filter-btn on" onclick="filterOrders('all',this)">Всички</button>
        <button class="filter-btn" onclick="filterOrders('pending',this)">Нови</button>
        <button class="filter-btn" onclick="filterOrders('paid',this)">Платени</button>
        <button class="filter-btn" onclick="filterOrders('shipped',this)">Изпратени</button>
        <button class="filter-btn" onclick="filterOrders('completed',this)">Завършени</button>
        <input class="search-input" id="search-input" placeholder="Търси по клиент, имейл..." oninput="renderTable()"/>
      </div>
      <!-- TABLE -->
      <div id="table-wrap">
        <div class="loading">Зарежда поръчки...</div>
      </div>
    </div>

    <!-- ===== VOUCHERS VIEW ===== -->
    <div id="view-vouchers" style="display:none">
      <!-- STATS -->
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Издадени ваучери</div><div class="stat-val" id="vs-total">—</div></div>
        <div class="stat-card"><div class="stat-label">Активни</div><div class="stat-val" id="vs-active">—</div></div>
        <div class="stat-card"><div class="stat-label">Продадена стойност (€)</div><div class="stat-val" id="vs-issued">—</div></div>
        <div class="stat-card"><div class="stat-label">Неизползвани (€)</div><div class="stat-val" id="vs-outstanding">—</div></div>
      </div>
      <!-- FILTERS -->
      <div class="filters">
        <button class="filter-btn on" onclick="filterVouchers('all',this)">Всички</button>
        <button class="filter-btn" onclick="filterVouchers('active',this)">Активни</button>
        <button class="filter-btn" onclick="filterVouchers('depleted',this)">Изчерпани</button>
        <input class="search-input" id="voucher-search" placeholder="Търси по код, имейл..." oninput="renderVouchers()"/>
      </div>
      <!-- TABLE -->
      <div id="vouchers-wrap">
        <div class="loading">Зарежда ваучери...</div>
      </div>
    </div>

    <!-- ===== PRODUCTS VIEW ===== -->
    <div id="view-products" style="display:none">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Общо продукти</div><div class="stat-val" id="ps-total">—</div></div>
        <div class="stat-card"><div class="stat-label">Активни</div><div class="stat-val" id="ps-active">—</div></div>
        <div class="stat-card"><div class="stat-label">Скрити</div><div class="stat-val" id="ps-hidden">—</div></div>
        <div class="stat-card"><div class="stat-label">Изчерпани</div><div class="stat-val" id="ps-sold">—</div></div>
      </div>
      <div class="filters">
        <button class="filter-btn on" onclick="filterProducts('all',this)">Всички</button>
        <button class="filter-btn" onclick="filterProducts('haori',this)">Хаори</button>
        <button class="filter-btn" onclick="filterProducts('kimono',this)">Кимоно</button>
        <button class="filter-btn" onclick="filterProducts('hidden',this)">Скрити</button>
        <button class="filter-btn" style="border-color:var(--GD);color:var(--GD)" onclick="newProduct()">+ Нов продукт</button>
        <input class="search-input" id="product-search" placeholder="Търси по име..." oninput="renderProducts()"/>
      </div>
      <div id="products-wrap"><div class="loading">Зарежда продукти...</div></div>
    </div>
  </div>
</div>

<!-- PRODUCT EDITOR DRAWER -->
<div class="order-drawer" id="product-drawer">
  <div class="od-header">
    <h3 id="pd-title">ПРОДУКТ</h3>
    <button class="od-close" onclick="closeProductDrawer()">×</button>
  </div>
  <div class="od-body" id="pd-body"></div>
</div>

<!-- ORDER DETAIL DRAWER -->
<div class="order-drawer" id="order-drawer">
  <div class="od-header">
    <h3 id="drawer-title">ПОРЪЧКА</h3>
    <button class="od-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="od-body" id="drawer-body"></div>
</div>

<script>
const SUPABASE_URL = 'https://owkoprksrvjlebonaehj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93a29wcmtzcnZqbGVib25hZWhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTIxNzgsImV4cCI6MjA5NjIyODE3OH0.UZdyvXOmEJTZ6r54fSlVgNNBja98qx-dpJqu9yGNlFA';

let allOrders = [];
let currentFilter = 'all';
let currentOrder = null;
let allVouchers = [];
let voucherFilter = 'all';
let vouchersLoaded = false;

// --- Supabase Auth (real email/password login) ---
function getToken() { return sessionStorage.getItem('kinora_admin_token'); }
function setSession(d) {
  sessionStorage.setItem('kinora_admin_token', d.access_token);
  if (d.refresh_token) sessionStorage.setItem('kinora_admin_refresh', d.refresh_token);
}
function clearSession() {
  sessionStorage.removeItem('kinora_admin_token');
  sessionStorage.removeItem('kinora_admin_refresh');
}
function showAdmin() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('admin-wrap').style.display = 'flex';
}

async function doLogin() {
  const email = document.getElementById('email-input').value.trim();
  const pwd = document.getElementById('pwd-input').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email, password: pwd })
    });
    if (!res.ok) {
      errEl.textContent = 'Грешен имейл или парола.';
      setTimeout(() => errEl.textContent = '', 3000);
      return;
    }
    setSession(await res.json());
    showAdmin();
    loadOrders();
  } catch(e) {
    errEl.textContent = 'Грешка при вход. Провери връзката.';
    setTimeout(() => errEl.textContent = '', 3000);
  }
}

function doLogout() {
  clearSession();
  location.reload();
}

// Exchange the refresh token for a fresh access token when the old one expires.
async function refreshSession() {
  const rt = sessionStorage.getItem('kinora_admin_refresh');
  if (!rt) return false;
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ refresh_token: rt })
    });
    if (!res.ok) return false;
    setSession(await res.json());
    return true;
  } catch(e) { return false; }
}

// fetch with the admin's session; retries once after refreshing an expired token.
async function authFetch(url, opts = {}) {
  const build = () => ({
    ...opts,
    headers: { ...(opts.headers || {}), 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${getToken()}` }
  });
  let res = await fetch(url, build());
  if (res.status === 401 && await refreshSession()) res = await fetch(url, build());
  return res;
}

if (getToken()) { showAdmin(); loadOrders(); }

async function loadOrders() {
  try {
    const res = await authFetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc`);
    if (res.status === 401) { clearSession(); location.reload(); return; }
    allOrders = await res.json();
    updateStats();
    renderTable();
    document.getElementById('last-refresh').textContent = 'Обновено: ' + new Date().toLocaleTimeString('bg-BG');
  } catch(e) {
    document.getElementById('table-wrap').innerHTML = '<div class="loading" style="color:#e07070">Грешка при зареждане. Провери интернет връзката.</div>';
  }
}

function updateStats() {
  document.getElementById('st-total').textContent = allOrders.length;
  document.getElementById('st-pending').textContent = allOrders.filter(o=>o.status==='pending').length;
  document.getElementById('st-revenue').textContent = Math.round(allOrders.reduce((s,o)=>s+(o.total||0),0)).toLocaleString('bg-BG');
  document.getElementById('st-shipped').textContent = allOrders.filter(o=>o.status==='shipped').length;
}

function filterOrders(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));

}

function closeDrawer() {
  document.getElementById('order-drawer').classList.remove('on');
}

async function saveStatus(id) {
  const newStatus = document.getElementById('status-select').value;
  try {
    const res = await authFetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    });
    if (res.ok) {
      const o = allOrders.find(x=>x.id===id);
      if (o) o.status = newStatus;
      renderTable();
      updateStats();
      alert('✓ Статусът е обновен: ' + STATUS_LABELS[newStatus]);
    }
  } catch(e) {
    alert('Грешка при обновяване. Опитай отново.');
  }
}

// ===== TABS & VOUCHERS =====
let activeTab = 'orders';

function switchTab(tab) {
  activeTab = tab;
  ['orders','vouchers','products'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('on', tab===t);
    document.getElementById('view-'+t).style.display = tab===t ? '' : 'none';
  });
  if (tab==='vouchers' && !vouchersLoaded) loadVouchers();
  if (tab==='products' && !productsLoaded) loadProductsAdmin();
}

function refreshActive() {
  if (activeTab==='vouchers') loadVouchers();
  else if (activeTab==='products') loadProductsAdmin();
  else loadOrders();
}

async function loadVouchers() {
  try {
    const res = await authFetch(`${SUPABASE_URL}/rest/v1/vouchers?select=*&order=created_at.desc`);
    if (res.status === 401) { clearSession(); location.reload(); return; }
    if (!res.ok) throw new Error(await res.text());
    allVouchers = await res.json();
    vouchersLoaded = true;
    updateVoucherStats();
    renderVouchers();
    document.getElementById('last-refresh').textContent = 'Обновено: ' + new Date().toLocaleTimeString('bg-BG');
  } catch(e) {
    document.getElementById('vouchers-wrap').innerHTML = '<div class="loading" style="color:#e07070">Грешка при зареждане на ваучерите. Изпълни vouchers-schema.sql в Supabase.</div>';
  }
}

function updateVoucherStats() {
  const total = allVouchers.length;
  const active = allVouchers.filter(v=>v.status==='active').length;
  const issued = allVouchers.reduce((s,v)=>s+Number(v.original_amount||0),0);
  const outstanding = allVouchers.reduce((s,v)=>s+Number(v.balance||0),0);
  document.getElementById('vs-total').textContent = total;
  document.getElementById('vs-active').textContent = active;
  document.getElementById('vs-issued').textContent = Math.round(issued).toLocaleString('bg-BG');
  document.getElementById('vs-outstanding').textContent = Math.round(outstanding).toLocaleString('bg-BG');
}

function filterVouchers(f, btn) {
  voucherFilter = f;
  document.querySelectorAll('#view-vouchers .filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderVouchers();
}

const VOUCHER_STATUS_LABELS = { active:'Активен', depleted:'Изчерпан', void:'Анулиран' };

function renderVouchers() {
  const search = document.getElementById('voucher-search').value.toLowerCase();

  }

  document.getElementById('vouchers-wrap').innerHTML = `<table class="orders-table">
    <thead><tr>
      <th>Код</th><th>Получател</th><th>Дата</th><th>Стойност</th><th>Наличност</th><th>Статус</th><th>Поръчка</th><th>Използван</th>
    </tr></thead>

      const date = new Date(v.created_at).toLocaleDateString('bg-BG',{day:'2-digit',month:'2-digit',year:'numeric'});

// ===== PRODUCTS =====
let allProducts = [];
let productFilter = 'all';
let productsLoaded = false;
let soldProductIds = new Set();
const LBL_OPTIONS = ['', 'Ново', 'Винтидж'];

async function loadProductsAdmin() {
  try {
    const [pRes, sRes] = await Promise.all([
      authFetch(`${SUPABASE_URL}/rest/v1/products?select=*&order=sort_order`),
      fetch(`${SUPABASE_URL}/rest/v1/rpc/sold_product_ids`, { method:'POST', headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}, body:'{}' })
    ]);
    if (pRes.status === 401) { clearSession(); location.reload(); return; }
    if (!pRes.ok) throw new Error(await pRes.text());
    allProducts = await pRes.json();
    try { const ids = await sRes.json(); if(Array.isArray(ids)) soldProductIds = new Set(ids); } catch(e){}
    productsLoaded = true;
    updateProductStats();
    renderProducts();
    document.getElementById('last-refresh').textContent = 'Обновено: ' + new Date().toLocaleTimeString('bg-BG');
  } catch(e) {
    document.getElementById('products-wrap').innerHTML = '<div class="loading" style="color:#e07070">Грешка при зареждане. Изпълни products-schema.sql в Supabase.</div>';
  }
}

function updateProductStats() {
  document.getElementById('ps-total').textContent = allProducts.length;
  document.getElementById('ps-active').textContent = allProducts.filter(p=>p.is_active).length;
  document.getElementById('ps-hidden').textContent = allProducts.filter(p=>!p.is_active).length;
  document.getElementById('ps-sold').textContent = allProducts.filter(p=>soldProductIds.has(p.id)).length;
}

function filterProducts(f, btn) {
  productFilter = f;
  document.querySelectorAll('#view-products .filter-btn').forEach(b=>b.classList.remove('on'));
  if(btn && btn.textContent.indexOf('Нов')===-1) btn.classList.add('on');
  renderProducts();
}

function renderProducts() {
  const search = (document.getElementById('product-search').value||'').toLowerCase();
  let list = allProducts;
  if (productFilter==='haori' || productFilter==='kimono') list = list.filter(p=>p.type===productFilter);
  else if (productFilter==='hidden') list = list.filter(p=>!p.is_active);
  if (search) list = list.filter(p=>(p.name||'').toLowerCase().includes(search));

  if (!list.length) {
    document.getElementById('products-wrap').innerHTML = `<div class="empty-state"><h3>НЯМА ПРОДУКТИ</h3><p>Натисни „+ Нов продукт", за да добавиш.</p></div>`;
    return;
  }
  document.getElementById('products-wrap').innerHTML = `<table class="orders-table">
    <thead><tr><th></th><th>Име</th><th>Тип</th><th>Цена</th><th>Състояние</th><th></th></tr></thead>
    <tbody>${list.map(p=>{
      const thumb = p.img ? `<img class="p-thumb-sm" src="${p.img}" alt=""/>` : `<div class="p-thumb-sm" style="background:${p.bg||'#0c0608'}"></div>`;
      const sold = soldProductIds.has(p.id) ? `<span class="b-sold-sm">Изчерпан</span>` : '';
      const state = p.is_active ? `<span class="status-badge s-active">Активен</span>` : `<span class="status-badge s-depleted">Скрит</span>`;
      return `<tr onclick="editProduct(${p.id})">
        <td>${thumb}</td>
        <td><div style="font-weight:500">${p.name||'—'}${sold}</div><div style="font-size:11px;color:rgba(228,216,192,.3)">${p.cat||''}</div></td>
        <td style="font-size:12px;color:rgba(228,216,192,.4)">${p.type==='haori'?'Хаори':'Кимоно'}</td>
        <td style="color:var(--GD);font-family:'Tenor Sans',sans-serif;font-size:15px">${Number(p.price||0).toFixed(2)} €</td>

function openProductDrawer(p) {

  document.getElementById('pd-body').innerHTML = productForm(p);

}
function closeProductDrawer(){ document.getElementById('product-drawer').classList.remove('on'); }
function newProduct(){ openProductDrawer({type:'haori',is_active:true,colors:[],sizes:[],details:[]}); }
function editProduct(id){ const p=allProducts.find(x=>x.id===id); if(p) openProductDrawer(p); }

async function uploadProductImage(input){
  const file = input.files[0]; if(!file) return;
  const msg = document.getElementById('pf-upmsg');
  msg.textContent = 'Качване...';
  const ext = (file.name.split('.').pop()||'jpg').toLowerCase();
  const path = `p-${Date.now()}-${Math.random().toString(36).slice(2,7)}.${ext}`;
  try {
    const res = await authFetch(`${SUPABASE_URL}/storage/v1/object/product-images/${path}`, {
      method:'POST', headers:{ 'Content-Type': file.type }, body:file
    });
    if(!res.ok) throw new Error(await res.text());
    const url = `${SUPABASE_URL}/storage/v1/object/public/product-images/${path}`;
    document.getElementById('pf-img').value = url;
    const t = document.getElementById('pf-thumb');
    t.outerHTML = `<img class="pf-thumb" id="pf-thumb" src="${url}"/>`;
    msg.textContent = '✓ Качено';
  } catch(e){ msg.textContent = 'Грешка при качване'; msg.style.color='#e07070'; }
}

function collectProduct() {
  const v = id => document.getElementById(id).value.trim();
  const numOrNull = id => { const x=document.getElementById(id).value.trim(); return x===''?null:Number(x); };
  const back=numOrNull('pf-m-back'), length=numOrNull('pf-m-length'), sleeve=numOrNull('pf-m-sleeve');
  const measure = (back!=null||length!=null||sleeve!=null) ? {back,length,sleeve} : null;
  const colors = ['pf-c0','pf-c1','pf-c2'].map(id=>document.getElementById(id).value);
  return {
    type: v('pf-type'), name: v('pf-name'), cat: v('pf-cat'), sub: v('pf-sub'),
    lbl: document.getElementById('pf-lbl').value,
    price: Number(document.getElementById('pf-price').value)||0,
    description: document.getElementById('pf-desc').value.trim(),
    sizes: v('pf-sizes').split(',').map(s=>s.trim()).filter(Boolean),
    details: document.getElementById('pf-details').value.split('\n').map(s=>s.trim()).filter(Boolean),
    measure, colors,
    bg: document.getElementById('pf-bg').value, acc: document.getElementById('pf-acc').value,
    img: document.getElementById('pf-img').value,
    is_active: document.getElementById('pf-active').checked,
    sort_order: allProducts.length ? Math.max(...allProducts.map(p=>p.sort_order||0))+1 : 0
  };
}

async function saveProduct(id) {
  const data = collectProduct();
  if(!data.name){ alert('Въведи име на продукта.'); return; }
  try {
    let res;
    if (id) {
      res = await authFetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, {
        method:'PATCH', headers:{'Content-Type':'application/json','Prefer':'return=minimal'}, body:JSON.stringify(data)
      });
    } else {
      res = await authFetch(`${SUPABASE_URL}/rest/v1/products`, {
        method:'POST', headers:{'Content-Type':'application/json','Prefer':'return=minimal'}, body:JSON.stringify(data)
      });
    }
    if(!res.ok) throw new Error(await res.text());
    closeProductDrawer();
    await loadProductsAdmin();
    alert('✓ Запазено.');
  } catch(e){ alert('Грешка при запазване: '+e.message); }
}

async function deleteProduct(id) {
  if(!confirm('Сигурни ли сте, че искате да изтриете този продукт?')) return;
  try {
    const res = await authFetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, { method:'DELETE', headers:{'Prefer':'return=minimal'} });
    if(!res.ok) throw new Error(await res.text());
    closeProductDrawer();
    await loadProductsAdmin();
  } catch(e){ alert('Грешка при изтриване: '+e.message); }
}

// Auto-refresh every 60 seconds — refreshes whichever tab is open.
setInterval(() => { if(getToken()) refreshActive(); }, 60000);
</script>
